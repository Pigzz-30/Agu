<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A股每日复盘</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f4;
      --panel: #ffffff;
      --ink: #15202b;
      --muted: #65717d;
      --line: #dce2da;
      --red: #c83c32;
      --blue: #2d5d8f;
      --gold: #b38a35;
      --green: #0e8062;
      --soft-red: #f3dedb;
      --soft-blue: #dce9f4;
      --soft-gold: #f2e6c7;
      --shadow: 0 16px 44px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(rgba(21, 32, 43, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21, 32, 43, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 160px 160px;
      color: var(--ink);
    }

    .wrap {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      padding: 10px 0 24px;
      border-bottom: 2px solid #cbd2c8;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 8vw, 74px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    a.button, button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      min-height: 42px;
      padding: 0 15px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: none;
    }

    button.primary, a.primary {
      background: #111827;
      border-color: #111827;
      color: #fff;
    }

    main { padding-top: 28px; }

    .notice {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .latest { grid-column: span 8; }
    .archive { grid-column: span 4; }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(25px, 4vw, 36px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.3;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 4px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 11px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .pill.red { background: var(--soft-red); color: var(--red); }
    .pill.blue { background: var(--soft-blue); color: var(--blue); }
    .pill.gold { background: var(--soft-gold); color: var(--gold); }
    .pill.green { background: #d9eee8; color: var(--green); }

    .report-list {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .report {
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .report-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .report-title {
      font-weight: 800;
      font-size: 20px;
    }

    .report-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .small-link {
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .report img {
      display: block;
      width: min(100%, 520px);
      max-height: 72vh;
      object-fit: contain;
      object-position: top center;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      margin-top: 10px;
    }

    .md-box {
      border: 1px solid var(--line);
      background: #fbfcf9;
      border-radius: 10px;
      padding: 14px;
      margin-top: 10px;
      color: #22303c;
      line-height: 1.7;
      overflow: auto;
      max-height: 420px;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .date-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      max-height: 70vh;
      overflow: auto;
      padding-right: 4px;
    }

    .date-button {
      width: 100%;
      justify-content: space-between;
      gap: 10px;
      border-radius: 8px;
      background: #fbfcf9;
      box-shadow: none;
    }

    .date-button.active {
      border-color: #111827;
      background: #111827;
      color: #fff;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      padding: 16px 2px;
    }

    @media (max-width: 860px) {
      header {
        grid-template-columns: 1fr;
      }

      .header-actions {
        justify-content: flex-start;
      }

      .latest, .archive {
        grid-column: 1 / -1;
      }

      .panel {
        padding: 16px;
      }

      .report-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .report img {
        width: 100%;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="eyebrow">A-share Daily Review</div>
        <h1>A股每日复盘</h1>
        <div class="subtitle">自动展示仓库里的 9点消息简报与15点收盘复盘。手机打开本页，即可看最新图片与 Markdown 归档。</div>
      </div>
      <div class="header-actions">
        <button class="primary" id="refreshBtn" type="button">刷新</button>
        <a class="button" href="https://github.com/Pigzz-30/Agu" target="_blank" rel="noreferrer">打开仓库</a>
      </div>
    </header>

    <main>
      <div class="notice" id="status">正在读取 GitHub 仓库...</div>

      <div class="grid">
        <section class="panel latest">
          <h2 id="latestTitle">最新复盘</h2>
          <div class="meta" id="latestMeta">等待数据加载。</div>
          <div class="pills">
            <span class="pill red">主板股票</span>
            <span class="pill blue">ETF</span>
            <span class="pill gold">每日归档</span>
            <span class="pill green">自动更新</span>
          </div>
          <div class="report-list" id="reports"></div>
        </section>

        <aside class="panel archive">
          <h2>历史日期</h2>
          <div class="meta">选择日期查看对应的图片和 Markdown。最新日期会自动置顶。</div>
          <div class="date-list" id="dateList"></div>
        </aside>
      </div>
    </main>

    <footer>
      内容仅作研究复盘，不构成投资建议。页面数据来自 GitHub 仓库公开文件；若刚生成结果，请等待 GitHub Pages 和浏览器缓存刷新。
    </footer>
  </div>

  <script>
    const OWNER = "Pigzz-30";
    const REPO = "Agu";
    const BRANCH = "master";
    const API_TREE = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
    const RAW_BASE = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/`;
    const GITHUB_BASE = `https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/`;

    const statusEl = document.getElementById("status");
    const reportsEl = document.getElementById("reports");
    const dateListEl = document.getElementById("dateList");
    const latestTitleEl = document.getElementById("latestTitle");
    const latestMetaEl = document.getElementById("latestMeta");
    const refreshBtn = document.getElementById("refreshBtn");

    let grouped = {};
    let dates = [];
    let activeDate = null;

    function encodePath(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function classifyFile(name) {
      if (name.includes("9点")) return "9点消息简报";
      if (name.includes("15点")) return "15点收盘复盘";
      if (name.includes("pushplus")) return "推送状态";
      if (name.includes("git_publish")) return "Git发布状态";
      return "其他文件";
    }

    function sortReports(files) {
      const weight = (file) => {
        if (file.name.includes("9点")) return 1;
        if (file.name.includes("15点")) return 2;
        if (file.name.endsWith(".png")) return 3;
        if (file.name.endsWith(".md")) return 4;
        return 9;
      };
      return [...files].sort((a, b) => weight(a) - weight(b) || a.name.localeCompare(b.name, "zh-CN"));
    }

    async function loadTree() {
      statusEl.textContent = "正在读取 GitHub 仓库...";
      reportsEl.innerHTML = "";
      dateListEl.innerHTML = "";

      const response = await fetch(API_TREE, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`GitHub API 返回 ${response.status}`);
      }

      const data = await response.json();
      const nextGrouped = {};

      for (const item of data.tree || []) {
        if (item.type !== "blob") continue;
        const match = item.path.match(/^每日复盘\/(\d{4}-\d{2}-\d{2})\/(.+)$/);
        if (!match) continue;
        const date = match[1];
        const name = match[2];
        if (!nextGrouped[date]) nextGrouped[date] = [];
        nextGrouped[date].push({
          path: item.path,
          name,
          kind: classifyFile(name),
          ext: name.split(".").pop().toLowerCase(),
          size: item.size || 0
        });
      }

      grouped = nextGrouped;
      dates = Object.keys(grouped).sort().reverse();
      activeDate = dates[0] || null;
      renderDates();
      await renderActiveDate();
      statusEl.textContent = activeDate ? "已加载最新归档。" : "仓库里还没有每日复盘文件。";
    }

    function renderDates() {
      dateListEl.innerHTML = "";
      if (!dates.length) {
        dateListEl.innerHTML = `<div class="empty">暂无归档。每天任务生成后，这里会自动出现日期。</div>`;
        return;
      }

      for (const date of dates) {
        const files = grouped[date] || [];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `date-button${date === activeDate ? " active" : ""}`;
        const pngCount = files.filter(file => file.ext === "png").length;
        const mdCount = files.filter(file => file.ext === "md").length;
        btn.innerHTML = `<span>${date}</span><span>${pngCount}图 / ${mdCount}文</span>`;
        btn.addEventListener("click", async () => {
          activeDate = date;
          renderDates();
          await renderActiveDate();
        });
        dateListEl.appendChild(btn);
      }
    }

    async function renderActiveDate() {
      reportsEl.innerHTML = "";
      if (!activeDate) {
        latestTitleEl.textContent = "最新复盘";
        latestMetaEl.textContent = "暂无数据。";
        reportsEl.innerHTML = `<div class="empty">还没有生成复盘文件。自动任务运行后，这里会显示最新内容。</div>`;
        return;
      }

      latestTitleEl.textContent = `${activeDate} 复盘`;
      const files = sortReports(grouped[activeDate] || []);
      latestMetaEl.textContent = `共 ${files.length} 个文件。优先展示 PNG 图片，Markdown 可展开查看。`;

      const reportGroups = {};
      for (const file of files) {
        if (!reportGroups[file.kind]) reportGroups[file.kind] = [];
        reportGroups[file.kind].push(file);
      }

      const order = ["9点消息简报", "15点收盘复盘", "Git发布状态", "推送状态", "其他文件"];
      let rendered = 0;
      for (const kind of order) {
        const group = reportGroups[kind] || [];
        if (!group.length) continue;
        rendered += 1;
        const section = document.createElement("article");
        section.className = "report";
        section.innerHTML = `
          <div class="report-head">
            <div>
              <div class="report-title">${kind}</div>
              <div class="meta">${group.map(file => file.name).join(" / ")}</div>
            </div>
            <div class="report-actions"></div>
          </div>
        `;

        const actions = section.querySelector(".report-actions");
        const pngFiles = group.filter(file => file.ext === "png");
        const mdFiles = group.filter(file => file.ext === "md" || file.ext === "json");

        for (const file of group) {
          const link = document.createElement("a");
          link.className = "small-link";
          link.href = GITHUB_BASE + encodePath(file.path);
          link.target = "_blank";
          link.rel = "noreferrer";
          link.textContent = file.ext.toUpperCase();
          actions.appendChild(link);
        }

        for (const file of pngFiles) {
          const img = document.createElement("img");
          img.loading = "lazy";
          img.alt = file.name;
          img.src = RAW_BASE + encodePath(file.path);
          section.appendChild(img);
        }

        for (const file of mdFiles) {
          const box = document.createElement("div");
          box.className = "md-box";
          box.textContent = "正在读取文本...";
          section.appendChild(box);
          fetch(RAW_BASE + encodePath(file.path), { cache: "no-store" })
            .then(resp => resp.ok ? resp.text() : Promise.reject(new Error(`读取失败 ${resp.status}`)))
            .then(text => { box.textContent = text; })
            .catch(err => { box.textContent = err.message; });
        }

        reportsEl.appendChild(section);
      }

      if (!rendered) {
        reportsEl.innerHTML = `<div class="empty">这个日期下暂无可展示文件。</div>`;
      }
    }

    refreshBtn.addEventListener("click", () => {
      loadTree().catch(handleError);
    });

    function handleError(error) {
      statusEl.textContent = `读取失败：${error.message}`;
      reportsEl.innerHTML = `<div class="empty">可以稍后刷新，或直接打开 GitHub 仓库查看文件。</div>`;
    }

    loadTree().catch(handleError);
  </script>
</body>
</html>
